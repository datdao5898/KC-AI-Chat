<!doctype html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KingCom AI Agent</title>
  <style>
    :root{--brand:#007f7b;--brand-2:#00a39d;--bg:#f5fbfa;--panel:#ffffff;--panel-2:#eef8f7;--text:#0f172a;--muted:#64748b;--line:#d9eeec;--shadow:0 18px 45px rgba(0,127,123,.10);--danger:#dc2626;--warn:#f59e0b;--ok:#059669;--bubble-in:#f1f5f9;--bubble-out:#e1f7f5}
    [data-theme="dark"]{--bg:#071716;--panel:#0d2422;--panel-2:#123431;--text:#ecfeff;--muted:#9cc9c6;--line:#1f4d49;--shadow:0 18px 45px rgba(0,0,0,.28);--bubble-in:#153331;--bubble-out:#064e4a}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,var(--bg),var(--panel-2));color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif}button,input,textarea,select{font:inherit}.app{display:grid;grid-template-columns:410px 1fr;min-height:100vh}.sidebar{padding:20px;border-right:1px solid var(--line);background:rgba(255,255,255,.55);backdrop-filter:blur(12px);overflow:auto;max-height:100vh}[data-theme="dark"] .sidebar{background:rgba(7,23,22,.72)}.main{padding:24px;overflow:auto;max-height:100vh}.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.logo{width:42px;height:42px;border-radius:14px;background:var(--brand);color:white;display:grid;place-items:center;font-weight:800;box-shadow:var(--shadow)}h1{font-size:22px;margin:0}h2{margin:0 0 14px;font-size:22px}h3{margin:18px 0 10px}.muted{color:var(--muted);font-size:13px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:22px;color:var(--brand)}.stat.warn b{color:var(--danger)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}.btn{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;background:var(--brand);color:white;font-weight:700;transition:.15s}.btn:hover{transform:translateY(-1px);background:var(--brand-2)}.btn.gray{background:#64748b}.btn.danger{background:var(--danger)}.btn.warn{background:var(--warn)}.btn.ok{background:var(--ok)}.btn.ghost{background:transparent;color:var(--brand);border:1px solid var(--line)}input,textarea,select{width:100%;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px;outline:none}textarea{min-height:92px;resize:vertical}.tabs,.filters{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:4px;margin:14px 0}.tabs button,.filters button{flex:1;border:0;background:transparent;color:var(--muted);border-radius:12px;padding:10px;cursor:pointer;font-weight:700}.tabs button.active,.filters button.active{background:var(--brand);color:white}.conv{cursor:pointer;transition:.15s}.conv:hover{transform:translateY(-1px);border-color:var(--brand)}.conv.active{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,127,123,.12)}.conv.need{border-color:#fecaca;background:linear-gradient(180deg,var(--panel),rgba(254,226,226,.28))}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;background:var(--panel-2);color:var(--brand);border:1px solid var(--line)}.badge.on{background:#dcfce7;color:#047857}.badge.off{background:#fee2e2;color:#b91c1c}.badge.need{background:#fee2e2;color:#b91c1c;border-color:#fecaca}.badge.sent{background:#dbeafe;color:#1d4ed8}.chat-head{position:sticky;top:0;z-index:2;background:linear-gradient(180deg,var(--bg),transparent);padding-bottom:10px}.summary,.alertbox{white-space:pre-wrap;background:var(--panel-2);border:1px dashed var(--line);border-radius:14px;padding:12px;line-height:1.5}.alertbox{border-color:#fecaca;background:rgba(254,226,226,.55)}[data-theme="dark"] .alertbox{background:rgba(127,29,29,.28);border-color:#7f1d1d}.messages{display:flex;flex-direction:column;gap:10px}.msg{max-width:860px;padding:12px 14px;border-radius:16px;white-space:pre-wrap;line-height:1.45;border:1px solid var(--line)}.msg.in{background:var(--bubble-in);align-self:flex-start}.msg.out{background:var(--bubble-out);align-self:flex-end}.msg small{display:block;color:var(--muted);margin-bottom:5px}.knowledge textarea{min-height:520px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.empty{display:grid;place-items:center;min-height:60vh;text-align:center}.toast{position:fixed;right:22px;bottom:22px;background:var(--brand);color:white;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);display:none}.toast.show{display:block}[hidden]{display:none!important}.login-screen{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:linear-gradient(135deg,var(--bg),var(--panel-2));padding:20px}.login-card{width:min(420px,100%);background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}.login-card label{display:block;font-weight:700;margin:12px 0 6px}.login-error{min-height:20px;color:var(--danger);font-weight:700;margin-top:10px}@media(max-width:960px){.app{grid-template-columns:1fr}.sidebar,.main{max-height:none}.stats{grid-template-columns:repeat(2,1fr)}}

    .msg-text,.alert-text{white-space:pre-wrap;word-break:break-word;margin-top:6px}
    .msg-text.collapsed,.alert-text.collapsed{max-height:150px;overflow:hidden;position:relative}
    .msg-text.collapsed:after,.alert-text.collapsed:after{content:"";position:absolute;left:0;right:0;bottom:0;height:44px;background:linear-gradient(transparent,var(--panel))}
    .msg.out .msg-text.collapsed:after{background:linear-gradient(transparent,var(--bubble-out))}
    .msg.in .msg-text.collapsed:after{background:linear-gradient(transparent,var(--bubble-in))}
    .show-more{margin-top:6px;border:0;background:transparent;color:var(--brand);font-weight:800;cursor:pointer;padding:4px 0}
    .messages-head{display:flex;justify-content:space-between;align-items:center;margin:10px 0;color:var(--muted);font-size:13px}
    .msg-meta{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap}
    .msg-actions{display:flex;gap:6px;align-items:center}
    .msg-actions .mini{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:3px 8px;font-size:11px;cursor:pointer}
    .msg-actions .mini:hover{color:var(--danger);border-color:var(--danger)}
    .conv-group,.source-group{border:1px solid var(--line);border-radius:16px;background:var(--panel);margin-bottom:10px;overflow:hidden}
    .conv-group>summary,.source-group>summary{cursor:pointer;list-style:none;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:800}
    .conv-group>summary::-webkit-details-marker,.source-group>summary::-webkit-details-marker{display:none}
    .source-group{margin:0 10px 10px;background:var(--panel-2);box-shadow:none}
    .source-group>summary{padding:10px 12px;font-size:14px}
    .conv-list{padding:0 10px 10px}
    .conv-list .card{margin-bottom:8px;border-radius:12px;box-shadow:none}
    .conv.compact{padding:10px 12px}
    .conv-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
    .conv-title b{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .conv-meta{display:block;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .count{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;font-weight:700}
    .info-toggle{margin-bottom:14px;overflow:hidden}
    .info-toggle>summary{cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:12px;font-weight:800}
    .info-toggle>summary::-webkit-details-marker{display:none}
    .info-toggle>summary:after{content:"+";display:grid;place-items:center;width:28px;height:28px;border-radius:999px;background:var(--panel-2);color:var(--brand);border:1px solid var(--line)}
    .info-toggle[open]>summary:after{content:"-"}
    .info-body{padding-top:12px}
    .staff-live{border-color:var(--brand);background:var(--panel)}
    .staff-live textarea{min-height:76px}
    .staff-live .muted{margin:6px 0 10px}
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <form class="login-card" id="loginForm">
      <div class="brand"><div class="logo">KC</div><div><h1>Admin Login</h1><div class="muted">KingCom AI Agent</div></div></div>
      <label for="loginUser">Username</label>
      <input id="loginUser" autocomplete="username" required />
      <label for="loginPass">Password</label>
      <input id="loginPass" type="password" autocomplete="current-password" required />
      <button class="btn" type="submit" style="width:100%;margin-top:14px">Login</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">KC</div><div><h1>KingCom AI Agent</h1><div class="muted">CSKH đa kênh</div></div></div>
      <div class="row space"><button class="btn ghost" id="themeBtn">🌙 Dark mode</button><button class="btn ghost" id="refreshBtn">↻ Tải lại</button><button class="btn ghost" id="logoutBtn">Logout</button><select id="langSelect" style="width:auto;min-width:96px"><option value="vi">VI</option><option value="en">EN</option><option value="zh">中文</option></select></div>
      <div class="stats" id="stats"></div>
      <div class="tabs"><button class="active" data-tab="chat">Hội thoại</button><button data-tab="knowledge">FAQ/Policy</button></div>
      <div class="filters"><button class="active" data-filter="all">Tất cả</button><button data-filter="need">Cần xử lý</button><button data-filter="auto">Auto ON</button></div>
      <h3>Hội thoại</h3><div id="conversationList"></div>
      <div class="card" style="margin-top:14px"><b>Test website chat</b><textarea id="testMsg">tôi muốn mua sản phẩm chưa có dữ liệu xyzabc</textarea><button class="btn" id="sendTestBtn">Gửi test</button></div>
    </aside>
    <main class="main" id="main"></main>
  </div>
  <div class="toast" id="toast"></div>
<script>

const I18N={

xóa mềm hội thoại',deleteMsgConfirm:'Xóa mềm tin nhắn này? Tin sẽ bị ẩn khỏi dashboard và không còn vào context AI.',deletedMessage:'Đã xóa mềm tin nhắn',reloaded:'Đã tải lại'},
en:{subtitle:'Multi-channel CS',dark:'🌙 Dark mode',light:'☀️ Light mode',refresh:'↻ Refresh',testTitle:'Test website chat',sendTest:'Send test',chatTab:'Conversations',knowledgeTab:'FAQ/Policy',all:'All',need:'Needs action',auto:'Auto ON',conversationsTitle:'Conversations',customers:'Customers',conversations:'Conversations',messages:'Messages',products:'Products',openAlerts:'Open alerts',needShort:'Needs action',needStaff:'Needs staff',needStaffHandle:'Needs staff handling',autoReplyOn:'Auto-reply on',autoReplyOff:'Auto-reply off',turnAutoOff:'Turn off auto-reply',turnAutoOn:'Turn on auto-reply',handoff:'Ask staff',resolved:'Resolved',summarize:'AI summary',deleteConversation:'Delete conversation',customerInfo:'Customer info',interested:'Interested',conversationSummary:'Conversation summary',noSummary:'No summary yet.',saveSummary:'Save summary',alertHistory:'Alert history',chatHistory:'Chat history',newestFirst:'Newest first',delete:'Delete',chooseConversation:'Select a conversation',chooseHelp:'Conversations needing staff will show a red badge.',noConversations:'No matching conversations',updated:'Updated',status:'Status',reason:'Reason',knowledgeTitle:'Manage FAQ / Policy / Catalog',policies:'Policies',catalogSummary:'Catalog summary',saveContent:'Save content',reload:'Reload',knowledgeHint:'This content is added to the RAG prompt for customer replies.',authPrompt:'Enter ADMIN_TOKEN to open dashboard:',loadError:'Failed to load data: ',loadedKnowledge:'Knowledge loaded',updatedAuto:'Auto-reply updated',handoffReasonPrompt:'Reason for staff handling:',handoffReasonDefault:'Staff to check and advise manually',alertCreated:'Staff alert created',resolvePrompt:'Resolution note:',resolveDefault:'Resolved',resolvedToast:'Marked as resolved',summarizing:'Generating AI summary...',summarized:'Summary generated',savedSummary:'Summary saved',saved:'Saved ',sentTest:'Test sent',deleteConvConfirm:'Soft delete this entire conversation? All messages will be hidden from the dashboard and AI context.',deletedConversation:'Conversation soft-deleted',deleteMsgConfirm:'Soft delete this message? It will be hidden from the dashboard and AI context.',deletedMessage:'Message soft-deleted',reloaded:'Reloaded'},
zh:{subtitle:'多渠道客服',dark:'🌙 深色模式',light:'☀️ 浅色模式',refresh:'↻ 刷新',testTitle:'测试网站聊天',sendTest:'发送测试',chatTab:'会话',knowledgeTab:'FAQ/政策',all:'全部',need:'待处理',auto:'自动开启',conversationsTitle:'会话',customers:'客户',conversations:'会话',messages:'消息',products:'产品',openAlerts:'未处理提醒',needShort:'待处理',needStaff:'需要人工',needStaffHandle:'需要人工处理',autoReplyOn:'自动回复已开',autoReplyOff:'自动回复已关',turnAutoOff:'关闭自动回复',turnAutoOn:'开启自动回复',handoff:'请求人工',resolved:'已处理',summarize:'AI 总结',deleteConversation:'删除会话',customerInfo:'客户信息',interested:'关注',conversationSummary:'会话总结',noSummary:'暂无总结。',saveSummary:'保存总结',alertHistory:'提醒记录',chatHistory:'聊天记录',newestFirst:'最新消息在上方',delete:'删除',chooseConversation:'请选择一个会话',chooseHelp:'需要人工处理的会话会显示红色标记。',noConversations:'没有匹配的会话',updated:'更新时间',status:'状态',reason:'原因',knowledgeTitle:'管理 FAQ / 政策 / 目录',policies:'政策',catalogSummary:'目录概览',saveContent:'保存内容',reload:'重新加载',knowledgeHint:'这些内容会加入 RAG 提示，用于回复客户。',authPrompt:'请输入 ADMIN_TOKEN 打开后台:',loadError:'加载数据失败: ',loadedKnowledge:'知识库已加载',updatedAuto:'自动回复已更新',handoffReasonPrompt:'需要人工处理的原因:',handoffReasonDefault:'人工检查并手动咨询',alertCreated:'已创建人工提醒',resolvePrompt:'处理备注:',resolveDefault:'已处理',resolvedToast:'已标记为处理完成',summarizing:'正在生成 AI 总结...',summarized:'总结已生成',savedSummary:'总结已保存',saved:'已保存 ',sentTest:'测试已发送',deleteConvConfirm:'确认软删除整个会话？所有消息将从后台和 AI 上下文中隐藏。',deletedConversation:'会话已软删除',deleteMsgConfirm:'确认软删除此消息？它将从后台和 AI 上下文中隐藏。',deletedMessage:'消息已软删除',reloaded:'已刷新'}};
const state={stats:{},convs:[],selected:null,tab:'chat',filter:'all',knowledge:{faq:'',policies:'',catalog_summary:''},kType:'faq',theme:localStorage.getItem('kc-theme')||'light',lang:localStorage.getItem('kc-admin-lang')||'vi'};
const t=k=>(I18N[state.lang]&&I18N[state.lang][k])||I18N.vi[k]||k;
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
function showLogin(message=''){if($('#loginError'))$('#loginError').textContent=message;$('#loginScreen').hidden=false;setTimeout(()=>$('#loginUser')?.focus(),30)}
function hideLogin(){$('#loginScreen').hidden=true;if($('#loginPass'))$('#loginPass').value='';if($('#loginError'))$('#loginError').textContent=''}
async function api(path,opts={}){const r=await fetch(path,{...opts,credentials:'same-origin'});if(path.startsWith(API)&&(r.status===401||r.status===403)){showLogin('Please login again.');throw new Error('unauthorized')}if(!r.ok)throw new Error(await r.text());return r.json()}
async function checkAuth(){try{await fetch('/auth/me',{credentials:'same-origin'}).then(r=>{if(!r.ok)throw new Error('unauthorized');return r.json()});hideLogin();return true}catch(e){showLogin();return false}}
async function login(e){e.preventDefault();const username=$('#loginUser').value.trim();const password=$('#loginPass').value;const r=await fetch('/auth/login',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});if(!r.ok){showLogin('Wrong username or password.');return}hideLogin();await startDashboard()}
async function logout(){await fetch('/auth/logout',{method:'POST',credentials:'same-origin'});showLogin('Logged out.')}
function setTheme(theme){state.theme=theme;document.documentElement.dataset.theme=theme;localStorage.setItem('kc-theme',theme);$('#themeBtn').textContent=theme==='dark'?t('light'):t('dark')}
function setLang(lang){state.lang=I18N[lang]?lang:'vi';document.documentElement.lang=state.lang;localStorage.setItem('kc-admin-lang',state.lang);if($('#langSelect'))$('#langSelect').value=state.lang;setTheme(state.theme);render()}

function renderExpandableText(text,cls='msg-text'){const raw=String(text??'');const long=raw.length>450||raw.split(/\r?\n/).length>8;return `<div class="${cls}${long?' collapsed':''}">${esc(raw)}</div>${long?'<button class="show-more" type="button">Xem thêm</button>':''}`}
function bindShowMore(){const infoBody=$('.info-body');const c=state.selected?.conversation;if(infoBody&&c&&!infoBody.dataset.contactRendered){infoBody.insertAdjacentHTML('afterbegin',renderCustomerContact(c));infoBody.dataset.contactRendered='1'}document.querySelectorAll('.show-more').forEach(btn=>btn.onclick=e=>{e.stopPropagation();const box=btn.previousElementSibling;const open=!box.classList.contains('expanded');box.classList.toggle('expanded',open);box.classList.toggle('collapsed',!open);btn.textContent=open?(state.lang==='en'?'Collapse':state.lang==='zh'?'收起':'Thu gọn'):(state.lang==='en'?'Show more':state.lang==='zh'?'查看更多':'Xem thêm')})}
function renderStats(){const s=state.stats;$('#stats').innerHTML=`<div class="stat">${t('customers')}<b>${s.customers||0}</b></div><div class="stat">${t('conversations')}<b>${s.conversations||0}</b></div><div class="stat warn">${t('needShort')}<b>${s.needs_human||0}</b></div><div class="stat">${t('messages')}<b>${s.messages||0}</b></div><div class="stat">${t('products')}<b>${s.products||0}</b></div><div class="stat warn">${t('openAlerts')}<b>${s.open_alerts||0}</b></div>`}
function renderShell(){document.querySelector('.brand .muted').textContent=t('subtitle');$('#refreshBtn').textContent=t('refresh');$('#themeBtn').textContent=state.theme==='dark'?t('light'):t('dark');document.querySelector('.card b').textContent=t('testTitle');$('#sendTestBtn').textContent=t('sendTest');document.querySelector('[data-tab="chat"]').textContent=t('chatTab');document.querySelector('[data-tab="knowledge"]').textContent=t('knowledgeTab');document.querySelector('[data-filter="all"]').textContent=t('all');document.querySelector('[data-filter="need"]').textContent=t('need');document.querySelector('[data-filter="auto"]').textContent=t('auto');document.querySelector('.sidebar h3').textContent=t('conversationsTitle');if($('#langSelect'))$('#langSelect').value=state.lang}
function channelOrder(group){return ({facebook:1,zalo:2,website:3})[group]||9}
function groupTitle(group,label){return label||({facebook:'Facebook',zalo:'Zalo',website:'Website'})[group]||group||'Khác'}
function groupConversations(rows){const grouped=new Map();for(const c of rows){const group=c.source_group||c.channel||'other';const source=c.source_name||c.channel||'Không rõ nguồn';if(!grouped.has(group))grouped.set(group,{key:group,label:groupTitle(group,c.source_group_label),items:new Map(),count:0,need:0});const g=grouped.get(group);if(!g.items.has(source))g.items.set(source,{name:source,rows:[],count:0,need:0});const s=g.items.get(source);s.rows.push(c);s.count++;g.count++;if(c.needs_human){s.need++;g.need++}}return [...grouped.values()].sort((a,b)=>channelOrder(a.key)-channelOrder(b.key)||a.label.localeCompare(b.label,'vi')).map(g=>({...g,items:[...g.items.values()].sort((a,b)=>b.need-a.need||b.count-a.count||a.name.localeCompare(b.name,'vi'))}))}
function filteredConvs(){return state.convs.filter(c=>state.filter==='need'?c.needs_human:state.filter==='auto'?c.auto_reply:1)}
function renderConvs(){const rows=filteredConvs().sort((a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0));const list=$('#conversationList');const groups=groupConversations(rows);const convUnit=state.lang==='en'?' conversations':state.lang==='zh'?' 个会话':' cuộc';list.innerHTML=groups.map(g=>`<details class="conv-group" open><summary><span>${esc(g.label)}</span><span class="count">${g.count}${convUnit}${g.need?` · ${g.need} ${t('needShort')}`:''}</span></summary>${g.items.map(src=>`<details class="source-group" open><summary><span>${esc(src.name)}</span><span class="count">${src.count}${src.need?` · ${src.need} ${t('needShort')}`:''}</span></summary><div class="conv-list">${src.rows.map(c=>`<div class="card conv compact ${c.needs_human?'need':''} ${state.selected?.conversation?.id===c.id?'active':''}" data-id="${esc(c.id)}"><div class="row"><span class="badge">${esc(c.channel)}</span><span class="badge ${c.auto_reply?'on':'off'}">${c.auto_reply?'Auto ON':'Auto OFF'}</span>${c.needs_human?`<span class="badge need">${t('needStaff')}</span>`:''}</div><div class="conv-title"><b>${esc(c.name||c.external_id)}</b></div><small class="muted conv-meta">${esc(c.updated_at)} | ${esc(c.handoff_reason||c.last_intent||'')}</small></div>`).join('')}</div></details>`).join('')}</details>`).join('')||`<div class="card muted">${t('noConversations')}</div>`;list.querySelectorAll('.conv').forEach(el=>el.onclick=()=>openConv(el.dataset.id))}
function contactLabel(key){const labels={vi:{name:'Tên',phone:'Số điện thoại',email:'Email'},en:{name:'Name',phone:'Phone',email:'Email'},zh:{name:'姓名',phone:'电话',email:'邮箱'}};return (labels[state.lang]||labels.vi)[key]||key}
function renderCustomerContact(c){const rows=[['name',c.name],['phone',c.phone],['email',c.email]].filter(([,v])=>String(v||'').trim());if(!rows.length)return `<p class="muted">${state.lang==='en'?'No contact info yet.':state.lang==='zh'?'暂无联系信息。':'Chưa có thông tin liên hệ.'}</p>`;return `<div class="summary">${rows.map(([k,v])=>`<b>${contactLabel(k)}:</b> ${esc(v)}`).join('<br>')}</div>`}
function renderChat(){const m=$('#main');const c=state.selected?.conversation;if(!c){m.innerHTML=`<div class="empty"><div><h2>${t('chooseConversation')}</h2><p class="muted">${t('chooseHelp')}</p></div></div>`;return}const alerts=state.selected.alerts||[];const messages=state.selected.messages||[];m.innerHTML=`<div class="chat-head"><div class="row space"><div><h2>${esc(c.name||c.external_id||'Khách chat')}</h2><div class="muted">${esc(c.channel)} · ID ${esc(c.external_id)} · ${t('updated')}: ${esc(c.updated_at)}</div></div><div class="row"><span class="badge ${c.auto_reply?'on':'off'}">${c.auto_reply?t('autoReplyOn'):t('autoReplyOff')}</span>${c.needs_human?`<span class="badge need">${t('needStaffHandle')}</span>`:''}<button class="btn ${c.auto_reply?'danger':'ok'}" id="toggleAutoBtn">${c.auto_reply?t('turnAutoOff'):t('turnAutoOn')}</button><button class="btn warn" id="handoffBtn">${t('handoff')}</button>${c.needs_human?`<button class="btn ok" id="resolveBtn">${t('resolved')}</button>`:''}<button class="btn" id="summaryBtn">${t('summarize')}</button><button class="btn danger" id="deleteConvBtn">${t('deleteConversation')}</button></div></div></div>${c.needs_human?`<div class="card alertbox"><b>${t('needStaff')}</b><p>${t('reason')}: ${esc(c.handoff_reason||'')}</p><p>${t('status')}: ${esc(c.handoff_status||'open')} · ${c.auto_reply?t('autoReplyOn'):t('autoReplyOff')}</p></div>`:''}<details class="card info-toggle"><summary>${t('customerInfo')}</summary><div class="info-body"><p class="muted">${t('interested')}: ${esc(c.interested_products||'[]')}</p><b>${t('conversationSummary')}</b><div class="summary">${esc(c.summary||t('noSummary'))}</div><textarea id="summaryText">${esc(c.summary||'')}</textarea><button class="btn gray" id="saveSummaryBtn">${t('saveSummary')}</button></div></details>${alerts.length?`<div class="card"><b>${t('alertHistory')}</b>${alerts.map(a=>`<div class="summary"><b>${esc(a.reason)}</b> <span class="badge ${a.delivery_status==='sent'?'sent':''}">${esc(a.delivery_status)}</span><br>${renderExpandableText(a.message,'alert-text')}<small>${esc(a.created_at)} · ${esc(a.status)}</small></div>`).join('<br>')}</div>`:''}<div class="messages-head"><b>${t('chatHistory')}</b><span>${t('newestFirst')}</span></div><div class="messages">${messages.map(msg=>`<div class="msg ${msg.direction==='in'?'in':'out'}"><div class="msg-meta"><small><b>${esc(msg.sender_type)}</b> · ${esc(msg.intent||'')} · ${esc(msg.created_at)}</small><div class="msg-actions"><button class="mini" type="button" data-delete-msg="${esc(msg.id)}">${t('delete')}</button></div></div>${renderExpandableText(msg.text)}</div>`).join('')}</div>`;$('#toggleAutoBtn').onclick=toggleAuto;$('#handoffBtn').onclick=handoff;if($('#resolveBtn'))$('#resolveBtn').onclick=resolveHandoff;$('#summaryBtn').onclick=summarize;$('#saveSummaryBtn').onclick=saveSummary;$('#deleteConvBtn').onclick=deleteConversation;document.querySelectorAll('[data-delete-msg]').forEach(btn=>btn.onclick=()=>deleteMessage(btn.dataset.deleteMsg));bindShowMore()}

function renderKnowledge(){const m=$('#main');const labels={faq:'FAQ',policies:t('policies'),catalog_summary:t('catalogSummary')};m.innerHTML=`<div class="knowledge"><h2>${t('knowledgeTitle')}</h2><div class="card"><select id="kType">${Object.entries(labels).map(([k,v])=>`<option value="${k}" ${state.kType===k?'selected':''}>${v}</option>`).join('')}</select><textarea id="kContent">${esc(state.knowledge[state.kType]||'')}</textarea><div class="row"><button class="btn" id="saveKnowledgeBtn">${t('saveContent')}</button><button class="btn gray" id="reloadKnowledgeBtn">${t('reload')}</button></div><p class="muted">${t('knowledgeHint')}</p></div></div>`;$('#kType').onchange=e=>{state.kType=e.target.value;renderKnowledge()};$('#saveKnowledgeBtn').onclick=saveKnowledge;$('#reloadKnowledgeBtn').onclick=loadKnowledge}
function render(){renderShell();renderStats();renderConvs();document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active',b.dataset.filter===state.filter));state.tab==='knowledge'?renderKnowledge():renderChat();injectStaffReplyPanel()}
function injectStaffReplyPanel(){const c=state.selected?.conversation;if(!c||c.channel!=='haravan_website'||$('#staffReplyPanel'))return;const anchor=$('.messages-head');if(!anchor)return;anchor.insertAdjacentHTML('beforebegin',`<div class="card staff-live" id="staffReplyPanel"><b>Nhân viên trực chat website</b><p class="muted">Tin nhắn gửi ở đây sẽ hiện trong widget. Khi gửi, auto-reply của hội thoại này sẽ tắt.</p><textarea id="staffReplyText" placeholder="Nhập phản hồi cho khách..."></textarea><button class="btn ok" id="staffReplyBtn">Gửi cho khách</button></div>`);$('#staffReplyBtn').onclick=sendStaffReply}
async function load(){try{const [stats,convs]=await Promise.all([api(API+'/stats'),api(API+'/conversations')]);state.stats=stats;state.convs=convs;renderStats();renderConvs()}catch(e){toast(t('loadError')+e.message)}}
async function loadKnowledge(){state.knowledge=await api(API+'/knowledge');render();toast(t('loadedKnowledge'))}
async function openConv(id){state.selected=await api(API+'/conversations/'+id);state.tab='chat';render()}
async function refreshSelected(){if(state.selected?.conversation?.id)state.selected=await api(API+'/conversations/'+state.selected.conversation.id);await load();render()}
async function toggleAuto(){await api(API+'/conversations/'+state.selected.conversation.id+'/toggle-auto-reply',{method:'POST'});await refreshSelected();toast(t('updatedAuto'))}
async function handoff(){const reason=prompt(t('handoffReasonPrompt'), state.selected?.conversation?.handoff_reason || t('handoffReasonDefault'));if(!reason)return;await api(API+'/conversations/'+state.selected.conversation.id+'/handoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason})});await refreshSelected();toast(t('alertCreated'))}
async function resolveHandoff(){const note=prompt(t('resolvePrompt'), t('resolveDefault'));await api(API+'/conversations/'+state.selected.conversation.id+'/resolve-handoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:note||''})});await refreshSelected();toast(t('resolvedToast'))}
async function summarize(){toast(t('summarizing'));await api(API+'/conversations/'+state.selected.conversation.id+'/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:state.lang})});await refreshSelected();toast(t('summarized'))}
async function sendStaffReply(){const text=$('#staffReplyText')?.value.trim();if(!text)return;await api(API+'/conversations/'+state.selected.conversation.id+'/staff-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});await refreshSelected();toast('Đã gửi tin nhắn cho khách')}
async function saveSummary(){await api(API+'/conversations/'+state.selected.conversation.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({summary:$('#summaryText').value})});await refreshSelected();toast(t('savedSummary'))}
async function saveKnowledge(){state.knowledge[state.kType]=$('#kContent').value;await api(API+'/knowledge/'+state.kType,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:state.knowledge[state.kType]})});toast(t('saved')+state.kType)}
async function sendTest(){await api('/webhooks/website-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({visitorId:'local-test-'+Date.now(),name:'Khách test',message:$('#testMsg').value})});await load();toast(t('sentTest'))}
async function deleteConversation(){const id=state.selected?.conversation?.id;if(!id)return;if(!confirm(t('deleteConvConfirm')))return;await api(API+'/conversations/'+encodeURIComponent(id),{method:'DELETE'});state.selected=null;await load();render();toast(t('deletedConversation'))}
async function deleteMessage(id){if(!confirm(t('deleteMsgConfirm')))return;await api(API+'/messages/'+encodeURIComponent(id),{method:'DELETE'});await refreshSelected();toast(t('deletedMessage'))}
async function startDashboard(){await Promise.all([load(),loadKnowledge()]);const id=new URLSearchParams(location.search).get('conversation');if(id)openConv(id);else render()}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});document.querySelectorAll('.filters button').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render()});$('#refreshBtn').onclick=async()=>{await load();toast(t('reloaded'))};$('#themeBtn').onclick=()=>setTheme(state.theme==='dark'?'light':'dark');$('#sendTestBtn').onclick=sendTest;$('#langSelect').onchange=e=>setLang(e.target.value);$('#loginForm').onsubmit=login;$('#logoutBtn').onclick=logout;setTheme(state.theme);setLang(state.lang);checkAuth().then(ok=>{if(ok)startDashboard()});setInterval(()=>{if($('#loginScreen')?.hidden)load()},10000);
</script>
</body></html>
