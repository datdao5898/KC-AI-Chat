<!doctype html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KingCom AI Agent</title>
  <style>
    :root{--brand:#007f7b;--brand-2:#00a39d;--bg:#f5fbfa;--panel:#ffffff;--panel-2:#eef8f7;--text:#0f172a;--muted:#64748b;--line:#d9eeec;--shadow:0 18px 45px rgba(0,127,123,.10);--danger:#dc2626;--warn:#f59e0b;--ok:#059669;--bubble-in:#f1f5f9;--bubble-out:#e1f7f5}
    [data-theme="dark"]{--bg:#071716;--panel:#0d2422;--panel-2:#123431;--text:#ecfeff;--muted:#9cc9c6;--line:#1f4d49;--shadow:0 18px 45px rgba(0,0,0,.28);--bubble-in:#153331;--bubble-out:#064e4a}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,var(--bg),var(--panel-2));color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif}button,input,textarea,select{font:inherit}.app{display:grid;grid-template-columns:410px 1fr;min-height:100vh}.sidebar{padding:20px;border-right:1px solid var(--line);background:rgba(255,255,255,.55);backdrop-filter:blur(12px);overflow:auto;max-height:100vh}[data-theme="dark"] .sidebar{background:rgba(7,23,22,.72)}.main{padding:24px;overflow:auto;max-height:100vh}.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.logo{width:42px;height:42px;border-radius:14px;background:var(--brand);color:white;display:grid;place-items:center;font-weight:800;box-shadow:var(--shadow)}h1{font-size:22px;margin:0}h2{margin:0 0 14px;font-size:22px}h3{margin:18px 0 10px}.muted{color:var(--muted);font-size:13px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:22px;color:var(--brand)}.stat.warn b{color:var(--danger)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}.btn{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;background:var(--brand);color:white;font-weight:700;transition:.15s}.btn:hover{transform:translateY(-1px);background:var(--brand-2)}.btn.gray{background:#64748b}.btn.danger{background:var(--danger)}.btn.warn{background:var(--warn)}.btn.ok{background:var(--ok)}.btn.ghost{background:transparent;color:var(--brand);border:1px solid var(--line)}input,textarea,select{width:100%;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px;outline:none}textarea{min-height:92px;resize:vertical}.tabs,.filters{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:4px;margin:14px 0}.tabs button,.filters button{flex:1;border:0;background:transparent;color:var(--muted);border-radius:12px;padding:10px;cursor:pointer;font-weight:700}.tabs button.active,.filters button.active{background:var(--brand);color:white}.conv{cursor:pointer;transition:.15s}.conv:hover{transform:translateY(-1px);border-color:var(--brand)}.conv.active{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,127,123,.12)}.conv.need{border-color:#fecaca;background:linear-gradient(180deg,var(--panel),rgba(254,226,226,.28))}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;background:var(--panel-2);color:var(--brand);border:1px solid var(--line)}.badge.on{background:#dcfce7;color:#047857}.badge.off{background:#fee2e2;color:#b91c1c}.badge.need{background:#fee2e2;color:#b91c1c;border-color:#fecaca}.badge.sent{background:#dbeafe;color:#1d4ed8}.chat-head{position:sticky;top:0;z-index:2;background:linear-gradient(180deg,var(--bg),transparent);padding-bottom:10px}.summary,.alertbox{white-space:pre-wrap;background:var(--panel-2);border:1px dashed var(--line);border-radius:14px;padding:12px;line-height:1.5}.alertbox{border-color:#fecaca;background:rgba(254,226,226,.55)}[data-theme="dark"] .alertbox{background:rgba(127,29,29,.28);border-color:#7f1d1d}.messages{display:flex;flex-direction:column;gap:10px}.msg{max-width:860px;padding:12px 14px;border-radius:16px;white-space:pre-wrap;line-height:1.45;border:1px solid var(--line)}.msg.in{background:var(--bubble-in);align-self:flex-start}.msg.out{background:var(--bubble-out);align-self:flex-end}.msg small{display:block;color:var(--muted);margin-bottom:5px}.knowledge textarea{min-height:520px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.empty{display:grid;place-items:center;min-height:60vh;text-align:center}.toast{position:fixed;right:22px;bottom:22px;background:var(--brand);color:white;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);display:none}.toast.show{display:block}@media(max-width:960px){.app{grid-template-columns:1fr}.sidebar,.main{max-height:none}.stats{grid-template-columns:repeat(2,1fr)}}

    .msg-text,.alert-text{white-space:pre-wrap;word-break:break-word;margin-top:6px}
    .msg-text.collapsed,.alert-text.collapsed{max-height:150px;overflow:hidden;position:relative}
    .msg-text.collapsed:after,.alert-text.collapsed:after{content:"";position:absolute;left:0;right:0;bottom:0;height:44px;background:linear-gradient(transparent,var(--panel))}
    .msg.out .msg-text.collapsed:after{background:linear-gradient(transparent,var(--bubble-out))}
    .msg.in .msg-text.collapsed:after{background:linear-gradient(transparent,var(--bubble-in))}
    .show-more{margin-top:6px;border:0;background:transparent;color:var(--brand);font-weight:800;cursor:pointer;padding:4px 0}
    .messages-head{display:flex;justify-content:space-between;align-items:center;margin:10px 0;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">KC</div><div><h1>KingCom AI Agent</h1><div class="muted">CSKH đa kênh</div></div></div>
      <div class="row space"><button class="btn ghost" id="themeBtn">🌙 Dark mode</button><button class="btn ghost" id="refreshBtn">↻ Tải lại</button></div>
      <div class="stats" id="stats"></div>
      <div class="card"><b>Test website chat</b><textarea id="testMsg">tôi muốn mua sản phẩm chưa có dữ liệu xyzabc</textarea><button class="btn" id="sendTestBtn">Gửi test</button></div>
      <div class="tabs"><button class="active" data-tab="chat">Hội thoại</button><button data-tab="knowledge">FAQ/Policy</button></div>
      <div class="filters"><button class="active" data-filter="all">Tất cả</button><button data-filter="need">Cần xử lý</button><button data-filter="auto">Auto ON</button></div>
      <h3>Hội thoại</h3><div id="conversationList"></div>
    </aside>
    <main class="main" id="main"></main>
  </div>
  <div class="toast" id="toast"></div>
<script>
const API='/api';
const state={stats:{},convs:[],selected:null,tab:'chat',filter:'all',knowledge:{faq:'',policies:'',catalog_summary:''},kType:'faq',theme:localStorage.getItem('kc-theme')||'light'};
const ADMIN_TOKEN_KEY='kc-admin-token';
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
function getAdminToken(force=false){let token=localStorage.getItem(ADMIN_TOKEN_KEY)||'';if(force||!token){token=prompt('Nhập ADMIN_TOKEN để mở dashboard:','')||'';if(token)localStorage.setItem(ADMIN_TOKEN_KEY,token)}return token}
async function api(path,opts={}){const needsAuth=path.startsWith(API);const headers={...(opts.headers||{})};if(needsAuth){const token=getAdminToken(false);if(token)headers.Authorization='Bearer '+token}let r=await fetch(path,{...opts,headers});if(needsAuth&&(r.status===401||r.status===403)){localStorage.removeItem(ADMIN_TOKEN_KEY);const token=getAdminToken(true);if(token){headers.Authorization='Bearer '+token;r=await fetch(path,{...opts,headers})}}if(!r.ok)throw new Error(await r.text());return r.json()}
function setTheme(t){state.theme=t;document.documentElement.dataset.theme=t;localStorage.setItem('kc-theme',t);$('#themeBtn').textContent=t==='dark'?'☀️ Light mode':'🌙 Dark mode'}

function renderExpandableText(text,cls='msg-text'){const raw=String(text??'');const long=raw.length>450||raw.split(/\r?\n/).length>8;return `<div class="${cls}${long?' collapsed':''}">${esc(raw)}</div>${long?'<button class="show-more" type="button">Xem thêm</button>':''}`}
function bindShowMore(){document.querySelectorAll('.show-more').forEach(btn=>btn.onclick=e=>{e.stopPropagation();const box=btn.previousElementSibling;const open=!box.classList.contains('expanded');box.classList.toggle('expanded',open);box.classList.toggle('collapsed',!open);btn.textContent=open?'Thu gọn':'Xem thêm'})}
function renderStats(){const s=state.stats;$('#stats').innerHTML=`<div class="stat">KH<b>${s.customers||0}</b></div><div class="stat">Hội thoại<b>${s.conversations||0}</b></div><div class="stat warn">Cần xử lý<b>${s.needs_human||0}</b></div><div class="stat">Tin nhắn<b>${s.messages||0}</b></div><div class="stat">SP<b>${s.products||0}</b></div><div class="stat warn">Alert mở<b>${s.open_alerts||0}</b></div>`}
function filteredConvs(){return state.convs.filter(c=>state.filter==='need'?c.needs_human:state.filter==='auto'?c.auto_reply:1)}
function renderConvs(){const rows=filteredConvs().sort((a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0));const list=$('#conversationList');list.innerHTML=rows.map(c=>`<div class="card conv ${c.needs_human?'need':''} ${state.selected?.conversation?.id===c.id?'active':''}" data-id="${esc(c.id)}"><div class="row"><span class="badge">${esc(c.channel)}</span><span class="badge ${c.auto_reply?'on':'off'}">${c.auto_reply?'Auto ON':'Auto OFF'}</span>${c.needs_human?`<span class="badge need">Cần nhân viên</span>`:''}</div><b>${esc(c.name||c.external_id)}</b>${renderExpandableText(c.last_message||'','alert-text')}<small class="muted">${esc(c.updated_at)} | ${esc(c.handoff_reason||c.last_intent||'')}</small></div>`).join('')||'<div class="card muted">Không có hội thoại phù hợp</div>';list.querySelectorAll('.conv').forEach(el=>el.onclick=()=>openConv(el.dataset.id));bindShowMore()}
function renderChat(){const m=$('#main');const c=state.selected?.conversation;if(!c){m.innerHTML='<div class="empty"><div><h2>Chọn hội thoại để xem</h2><p class="muted">Các hội thoại cần người thật sẽ hiện badge đỏ.</p></div></div>';return}const alerts=state.selected.alerts||[];const messages=state.selected.messages||[];m.innerHTML=`<div class="chat-head"><div class="row space"><div><h2>${esc(c.channel)} / ${esc(c.external_id)}</h2><div class="muted">Cập nhật: ${esc(c.updated_at)}</div></div><div class="row"><span class="badge ${c.auto_reply?'on':'off'}">${c.auto_reply?'Auto-reply bật':'Auto-reply tắt'}</span>${c.needs_human?'<span class="badge need">Cần nhân viên xử lý</span>':''}<button class="btn ${c.auto_reply?'danger':'ok'}" id="toggleAutoBtn">${c.auto_reply?'Tắt auto-reply':'Bật auto-reply'}</button><button class="btn warn" id="handoffBtn">Yêu cầu nhân viên</button>${c.needs_human?'<button class="btn ok" id="resolveBtn">Đã xử lý</button>':''}<button class="btn" id="summaryBtn">Tóm tắt AI</button></div></div></div>${c.needs_human?`<div class="card alertbox"><b>🚨 Cần nhân viên</b><p>Lý do: ${esc(c.handoff_reason||'Cần kiểm tra')}</p><p>Trạng thái: ${esc(c.handoff_status||'open')} · Auto-reply đã ${c.auto_reply?'bật':'tắt'}</p></div>`:''}<div class="card"><b>Thông tin khách</b><p class="muted">Quan tâm: ${esc(c.interested_products||'[]')}</p><b>Tóm tắt hội thoại</b><div class="summary">${esc(c.summary||'Chưa có tóm tắt.')}</div><textarea id="summaryText">${esc(c.summary||'')}</textarea><button class="btn gray" id="saveSummaryBtn">Lưu tóm tắt</button></div>${alerts.length?`<div class="card"><b>Lịch sử alert</b>${alerts.map(a=>`<div class="summary"><b>${esc(a.reason)}</b> <span class="badge ${a.delivery_status==='sent'?'sent':''}">${esc(a.delivery_status)}</span><br>${renderExpandableText(a.message,'alert-text')}<small>${esc(a.created_at)} · ${esc(a.status)}</small></div>`).join('<br>')}</div>`:''}<div class="messages-head"><b>Lịch sử chat</b><span>Tin mới nhất ở trên</span></div><div class="messages">${messages.map(msg=>`<div class="msg ${msg.direction==='in'?'in':'out'}"><small><b>${esc(msg.sender_type)}</b> · ${esc(msg.intent||'')} · ${esc(msg.created_at)}</small>${renderExpandableText(msg.text)}</div>`).join('')}</div>`;$('#toggleAutoBtn').onclick=toggleAuto;$('#handoffBtn').onclick=handoff;if($('#resolveBtn'))$('#resolveBtn').onclick=resolveHandoff;$('#summaryBtn').onclick=summarize;$('#saveSummaryBtn').onclick=saveSummary;bindShowMore()}

function renderKnowledge(){const m=$('#main');const labels={faq:'FAQ',policies:'Chính sách',catalog_summary:'Tổng quan catalog'};m.innerHTML=`<div class="knowledge"><h2>Quản lý FAQ / Policy / Catalog</h2><div class="card"><select id="kType">${Object.entries(labels).map(([k,v])=>`<option value="${k}" ${state.kType===k?'selected':''}>${v}</option>`).join('')}</select><textarea id="kContent">${esc(state.knowledge[state.kType]||'')}</textarea><div class="row"><button class="btn" id="saveKnowledgeBtn">Lưu nội dung</button><button class="btn gray" id="reloadKnowledgeBtn">Tải lại</button></div><p class="muted">Nội dung này được đưa vào RAG prompt để AI trả lời khách.</p></div></div>`;$('#kType').onchange=e=>{state.kType=e.target.value;renderKnowledge()};$('#saveKnowledgeBtn').onclick=saveKnowledge;$('#reloadKnowledgeBtn').onclick=loadKnowledge}
function render(){renderStats();renderConvs();document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active',b.dataset.filter===state.filter));state.tab==='knowledge'?renderKnowledge():renderChat()}
async function load(){try{const [stats,convs]=await Promise.all([api(API+'/stats'),api(API+'/conversations')]);state.stats=stats;state.convs=convs;renderStats();renderConvs()}catch(e){toast('Lỗi tải dữ liệu: '+e.message)}}
async function loadKnowledge(){state.knowledge=await api(API+'/knowledge');render();toast('Đã tải knowledge')}
async function openConv(id){state.selected=await api(API+'/conversations/'+id);state.tab='chat';render()}
async function refreshSelected(){if(state.selected?.conversation?.id)state.selected=await api(API+'/conversations/'+state.selected.conversation.id);await load();render()}
async function toggleAuto(){await api(API+'/conversations/'+state.selected.conversation.id+'/toggle-auto-reply',{method:'POST'});await refreshSelected();toast('Đã cập nhật auto-reply')}
async function handoff(){const reason=prompt('Lý do cần nhân viên xử lý:', state.selected?.conversation?.handoff_reason || 'Nhân viên kiểm tra và tư vấn thủ công');if(!reason)return;await api(API+'/conversations/'+state.selected.conversation.id+'/handoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason})});await refreshSelected();toast('Đã tạo alert nhân viên')}
async function resolveHandoff(){const note=prompt('Ghi chú xử lý:', 'Đã xử lý');await api(API+'/conversations/'+state.selected.conversation.id+'/resolve-handoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:note||''})});await refreshSelected();toast('Đã đánh dấu xử lý')}
async function summarize(){toast('Đang tóm tắt AI...');await api(API+'/conversations/'+state.selected.conversation.id+'/summarize',{method:'POST'});await refreshSelected();toast('Đã tóm tắt')}
async function saveSummary(){await api(API+'/conversations/'+state.selected.conversation.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({summary:$('#summaryText').value})});await refreshSelected();toast('Đã lưu tóm tắt')}
async function saveKnowledge(){state.knowledge[state.kType]=$('#kContent').value;await api(API+'/knowledge/'+state.kType,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:state.knowledge[state.kType]})});toast('Đã lưu '+state.kType)}
async function sendTest(){await api('/webhooks/website-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({visitorId:'local-test-'+Date.now(),name:'Khách test',message:$('#testMsg').value})});await load();toast('Đã gửi test')}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});document.querySelectorAll('.filters button').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render()});$('#refreshBtn').onclick=async()=>{await load();toast('Đã tải lại')};$('#themeBtn').onclick=()=>setTheme(state.theme==='dark'?'light':'dark');$('#sendTestBtn').onclick=sendTest;setTheme(state.theme);Promise.all([load(),loadKnowledge()]).then(()=>{const id=new URLSearchParams(location.search).get('conversation');if(id)openConv(id);else render()});setInterval(load,10000);
</script>
</body></html>
