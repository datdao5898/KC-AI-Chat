<!doctype html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KingCom AI Agent</title>
  <style>
    :root {
      --kc-primary: #007f7b;
      --kc-primary-dark: #005f5c;
      --kc-primary-soft: #e6f7f6;
      --kc-accent: #ff2d94;
      --kc-accent-dark: #d91f79;
      --kc-accent-soft: #fff0f7;
      --kc-bg: #f4fbfa;
      --kc-surface: #ffffff;
      --kc-surface-2: #f8fafc;
      --kc-line: #d7eeee;
      --kc-line-2: #e5e7eb;
      --kc-text: #0f172a;
      --kc-muted: #64748b;
      --kc-danger: #dc2626;
      --kc-warn: #f59e0b;
      --kc-ok: #16a34a;
      --kc-info: #2563eb;
      --kc-shadow: 0 18px 45px rgba(0, 127, 123, .10);
      --kc-nav: #007f7b;
      --kc-nav-2: #006c68;
      --kc-in: #ffffff;
      --kc-out: #e7f7f6;
      --kc-radius: 8px;
    }

    [data-theme="dark"] {
      --kc-bg: #071716;
      --kc-surface: #0d2422;
      --kc-surface-2: #123431;
      --kc-line: #24524f;
      --kc-line-2: #1f4d49;
      --kc-text: #ecfeff;
      --kc-muted: #9cc9c6;
      --kc-shadow: 0 18px 45px rgba(0, 0, 0, .28);
      --kc-nav: #041f1e;
      --kc-nav-2: #031615;
      --kc-in: #112f2d;
      --kc-out: #064e4a;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--kc-bg);
      color: var(--kc-text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    [hidden] { display: none !important; }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 20px;
      background: radial-gradient(circle at top left, rgba(0, 127, 123, .13), transparent 34%), var(--kc-bg);
    }

    .login-card {
      width: min(420px, 100%);
      padding: 24px;
      background: var(--kc-surface);
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      box-shadow: var(--kc-shadow);
    }

    .login-card .logo {
      background: var(--kc-primary);
    }

    .login-card label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 800;
      color: var(--kc-text);
    }

    .login-error {
      min-height: 22px;
      margin-top: 12px;
      color: var(--kc-danger);
      font-weight: 800;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      min-height: 100vh;
    }

    .side-nav {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 12px 18px;
      color: #e8fffd;
      background: linear-gradient(180deg, var(--kc-nav), var(--kc-nav-2));
      border-right: 1px solid rgba(0, 95, 92, .34);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
      padding: 4px 8px 8px;
    }

    .logo {
      width: 112px;
      height: 48px;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 7px;
      background: rgba(0, 95, 92, .30);
      color: #ffffff;
      font-weight: 800;
      box-shadow: none;
      overflow: hidden;
    }

    .logo img {
      width: 94px;
      height: auto;
      display: block;
    }

    .brand-title {
      min-width: 0;
    }

    .brand-title h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-title span {
      display: block;
      margin-top: 4px;
      color: rgba(232, 255, 253, .72);
      font-size: 12px;
      font-weight: 600;
    }

    .side-nav .brand {
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      padding-bottom: 14px;
    }

    .side-nav .logo {
      width: 132px;
      height: 56px;
      justify-content: start;
      padding-left: 10px;
    }

    .side-nav .logo img {
      width: 108px;
    }

    .side-nav .brand-title h1 {
      display: none;
    }

    .side-nav .brand-title span {
      margin-top: 0;
      padding-left: 4px;
      color: rgba(232, 255, 253, .86);
    }

    .nav-menu {
      display: grid;
      gap: 7px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 10px 10px;
      border: 0;
      border-radius: var(--kc-radius);
      color: rgba(232, 255, 253, .82);
      background: transparent;
      text-align: left;
      font-weight: 700;
    }

    .nav-btn:hover,
    .nav-btn.active {
      color: #ffffff;
      background: rgba(0, 95, 92, .36);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: currentColor;
      opacity: .92;
    }

    .nav-icon svg {
      width: 19px;
      height: 19px;
      display: block;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .nav-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
    }

    .admin-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, .78);
      border-bottom: 1px solid var(--kc-line);
      backdrop-filter: blur(14px);
    }

    [data-theme="dark"] .topbar { background: rgba(13, 36, 34, .78); }

    .page-title h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .page-title span {
      display: block;
      margin-top: 2px;
      color: var(--kc-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .content {
      min-height: 0;
      flex: 1;
      overflow: hidden;
    }

    .workspace {
      height: 100%;
      display: grid;
      grid-template-columns: 220px 280px minmax(0, 1fr) 280px;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--kc-surface);
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      box-shadow: 0 10px 30px rgba(15, 23, 42, .04);
      overflow: hidden;
    }

    .panel-head {
      flex: 0 0 auto;
      padding: 14px;
      border-bottom: 1px solid var(--kc-line);
    }

    .panel-head h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .panel-head .muted {
      margin-top: 3px;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .panel-footer {
      flex: 0 0 auto;
      padding: 12px;
      border-top: 1px solid var(--kc-line);
      background: var(--kc-surface-2);
    }

    .muted {
      color: var(--kc-muted);
      font-size: 13px;
      font-weight: 650;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .space { justify-content: space-between; }

    .btn {
      min-height: 38px;
      border: 0;
      border-radius: var(--kc-radius);
      padding: 9px 13px;
      color: #ffffff;
      background: var(--kc-primary);
      font-weight: 700;
      transition: background .15s ease, transform .15s ease, border-color .15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--kc-primary-dark);
      transform: translateY(-1px);
    }

    .btn.accent { background: var(--kc-accent); }
    .btn.accent:hover { background: var(--kc-accent-dark); }
    .btn.danger { background: var(--kc-danger); }
    .btn.warn { background: var(--kc-warn); color: #111827; }
    .btn.ok { background: var(--kc-ok); }
    .btn.gray { background: #64748b; }
    .btn.ghost {
      color: var(--kc-primary);
      background: transparent;
      border: 1px solid var(--kc-line);
    }

    .btn.ghost:hover {
      color: var(--kc-primary-dark);
      background: var(--kc-primary-soft);
      border-color: var(--kc-primary);
    }

    .nav-footer .btn.ghost {
      color: #e8fffd;
      border-color: rgba(255, 255, 255, .2);
      background: rgba(0, 95, 92, .28);
    }

    input, textarea, select {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      color: var(--kc-text);
      background: var(--kc-surface);
      outline: 0;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--kc-primary);
      box-shadow: 0 0 0 3px rgba(0, 127, 123, .12);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
      background: var(--kc-surface-2);
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
    }

    .segmented button {
      min-height: 34px;
      border: 0;
      border-radius: 7px;
      color: var(--kc-muted);
      background: transparent;
      font-weight: 700;
    }

    .segmented button.active {
      color: #ffffff;
      background: var(--kc-primary);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(108px, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 14px;
      background: var(--kc-surface);
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
    }

    .stat-card b {
      display: block;
      margin-top: 6px;
      color: var(--kc-primary);
      font-size: 28px;
      line-height: 1;
    }

    .stat-card.accent b { color: var(--kc-accent); }

    .source-tree {
      display: grid;
      gap: 8px;
      padding-right: 2px;
    }

    .source-group {
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      overflow: hidden;
      background: var(--kc-surface);
    }

    .source-group summary {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 11px;
      list-style: none;
      font-weight: 700;
      cursor: pointer;
    }

    .source-group summary::-webkit-details-marker { display: none; }

    .source-item {
      width: calc(100% - 12px);
      margin: 0 6px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--kc-text);
      background: transparent;
      text-align: left;
      font-weight: 700;
      font-size: 14px;
    }

    .source-item:hover,
    .source-item.active {
      color: var(--kc-primary);
      border-color: var(--kc-line);
      background: var(--kc-primary-soft);
    }

    .count {
      flex: 0 0 auto;
      color: var(--kc-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .conv-list {
      min-height: 0;
      overflow: auto;
      flex: 1;
      display: grid;
      align-content: start;
      gap: 8px;
      margin-top: 12px;
    }

    .conv-item {
      display: grid;
      gap: 7px;
      width: 100%;
      padding: 11px;
      border: 1px solid var(--kc-line-2);
      border-radius: var(--kc-radius);
      color: var(--kc-text);
      background: var(--kc-surface);
      text-align: left;
    }

    .conv-item:hover,
    .conv-item.active {
      border-color: var(--kc-primary);
      box-shadow: 0 0 0 3px rgba(0, 127, 123, .10);
    }

    .conv-item.need {
      border-color: rgba(255, 45, 148, .28);
      background: var(--kc-surface);
    }

    .conv-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
    }

    .conv-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--kc-line);
      border-radius: 999px;
      color: var(--kc-primary);
      background: var(--kc-primary-soft);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.on {
      color: #047857;
      background: #dcfce7;
      border-color: #bbf7d0;
    }

    .badge.off {
      color: #b91c1c;
      background: #fee2e2;
      border-color: #fecaca;
    }

    .badge.need {
      color: #be185d;
      background: var(--kc-accent-soft);
      border-color: rgba(255, 45, 148, .35);
    }

    .badge.warn {
      color: #92400e;
      background: #fef3c7;
      border-color: #fde68a;
    }

    .badge.sent {
      color: #1d4ed8;
      background: #dbeafe;
      border-color: #bfdbfe;
    }

    .chat-panel .panel-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      background: linear-gradient(180deg, var(--kc-bg), var(--kc-surface-2));
    }

    .chat-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .chat-title {
      min-width: 0;
    }

    .chat-title h3 {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
    }

    .chat-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .messages {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0;
    }

    .msg {
      max-width: min(720px, 88%);
      padding: 10px 12px;
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      white-space: normal;
      line-height: 1.4;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .04);
    }

    .msg.in {
      align-self: flex-start;
      background: var(--kc-in);
    }

    .msg.out {
      align-self: flex-end;
      background: var(--kc-out);
      border-color: rgba(0, 127, 123, .25);
    }

    .msg-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--kc-muted);
      font-size: 12px;
      font-weight: 650;
    }

    .msg-text,
    .alert-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-text.collapsed,
    .alert-text.collapsed {
      position: relative;
      max-height: 150px;
      overflow: hidden;
    }

    .show-more {
      margin-top: 6px;
      padding: 0;
      border: 0;
      color: var(--kc-primary);
      background: transparent;
      font-weight: 700;
    }

    .mini {
      min-height: 26px;
      padding: 3px 8px;
      border: 1px solid var(--kc-line);
      border-radius: 999px;
      color: var(--kc-muted);
      background: transparent;
      font-size: 12px;
      font-weight: 700;
    }

    .mini:hover {
      color: var(--kc-danger);
      border-color: var(--kc-danger);
    }

    .detail-section {
      padding: 14px;
      border-bottom: 1px solid var(--kc-line);
    }

    .detail-section:last-child { border-bottom: 0; }
    .detail-panel .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .source-panel .panel-body,
    .conversation-panel .panel-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .source-panel .source-tree {
      min-height: 0;
      overflow: auto;
    }

    .search-box {
      margin-bottom: 10px;
    }

    .detail-section h4 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .summary-box,
    .alert-box {
      padding: 10px;
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      background: var(--kc-surface-2);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
    }

    .alert-box {
      display: grid;
      gap: 8px;
      margin-bottom: 8px;
      padding: 10px 11px;
      border: 1px solid var(--kc-line);
      border-left: 4px solid var(--kc-accent);
      border-radius: var(--kc-radius);
      background: var(--kc-surface);
    }

    [data-theme="dark"] .alert-box {
      background: var(--kc-surface);
    }

    .alert-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .alert-message {
      color: var(--kc-text);
      line-height: 1.4;
      display: -webkit-box;
      overflow: hidden;
      white-space: normal;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .alert-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--kc-muted);
      font-size: 12px;
      font-weight: 650;
    }

    .alert-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .form-stack {
      display: grid;
      gap: 10px;
    }

    .staff-reply {
      display: grid;
      gap: 9px;
      padding: 12px;
      border: 1px solid rgba(0, 127, 123, .22);
      border-radius: var(--kc-radius);
      background: var(--kc-surface);
    }

    .empty-state {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--kc-muted);
      text-align: center;
    }

    .empty-state h3 {
      margin: 0 0 6px;
      color: var(--kc-text);
      font-size: 18px;
    }

    .page {
      height: 100%;
      overflow: auto;
      padding: 14px;
    }

    .dashboard-grid {
      display: grid;
      gap: 14px;
    }

    .dashboard-row {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(300px, .9fr);
      gap: 14px;
    }

    .page-card {
      background: var(--kc-surface);
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      box-shadow: 0 10px 30px rgba(15, 23, 42, .04);
      overflow: hidden;
    }

    .page-card > .panel-head {
      border-bottom: 1px solid var(--kc-line);
    }

    .knowledge-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 14px;
    }

    .knowledge-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--kc-surface);
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
    }

    .knowledge-card label {
      font-weight: 900;
    }

    .knowledge-card textarea {
      min-height: 410px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .upload-card {
      display: grid;
      gap: 8px;
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      background: #ffffff;
    }

    .upload-card strong {
      color: var(--kc-text);
      font-size: 13px;
      line-height: 1.25;
    }

    .upload-card input[type="file"] {
      width: 100%;
      min-width: 0;
      font-size: 12px;
    }

    .upload-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .upload-meta {
      min-height: 18px;
      color: var(--kc-muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .file-viewer {
      margin: 0 14px 14px;
      padding: 12px;
      border: 1px solid var(--kc-line);
      border-radius: var(--kc-radius);
      background: var(--kc-surface-2);
    }

    .file-viewer textarea {
      min-height: 260px;
      margin-top: 10px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      white-space: pre;
    }

    .test-chat {
      display: grid;
      gap: 8px;
    }

    .test-chat summary {
      cursor: pointer;
      font-weight: 700;

  toast.timer = setTimeout(() => el.classList.remove('show'), 2400);
}

function showLogin(message = '') {
  $('#loginScreen').hidden = false;
  $('#loginError').textContent = message;
  setTimeout(() => $('#loginUser')?.focus(), 30);
}

function hideLogin() {
  $('#loginScreen').hidden = true;
  $('#loginPass').value = '';
  $('#loginError').textContent = '';
}

async function api(path, opts = {}) {
  const res = await fetch(path, { ...opts, credentials: 'same-origin' });
  if (path.startsWith(API) && (res.status === 401 || res.status === 403)) {
    showLogin(t('authAgain'));
    throw new Error('unauthorized');
  }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function checkAuth() {
  try {
    const res = await fetch('/auth/me', { credentials: 'same-origin' });
    if (!res.ok) throw new Error('unauthorized');
    hideLogin();
    return true;
  } catch {
    showLogin();
    return false;
  }
}

async function login(event) {
  event.preventDefault();
  const username = $('#loginUser').value.trim();
  const password = $('#loginPass').value;
  const res = await fetch('/auth/login', {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  if (!res.ok) {
    showLogin(t('loginFailed'));
    return;
  }
  hideLogin();
  await startDashboard();
}

async function logout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
  showLogin('Logged out.');
}

function formatDate(value) {
  if (!value) return '';
  try {
    return new Intl.DateTimeFormat(state.lang === 'vi' ? 'vi-VN' : state.lang === 'zh' ? 'zh-CN' : 'en-US', {
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    }).format(new Date(value));
  } catch {
    return String(value);
  }
}

function buildSourceTree() {
  const map = new Map();
  for (const conv of state.convs) {
    const group = conv.source_group || conv.channel || 'common';
    const key = getConvSourceKey(conv);
    const name = conv.source_name || sourceGroupLabel(group);
    if (!map.has(group)) map.set(group, { group, count: 0, need: 0, review: 0, sources: new Map() });
    const g = map.get(group);
    if (!g.sources.has(key)) g.sources.set(key, { key, group, name, count: 0, need: 0, review: 0 });
    const source = g.sources.get(key);
    g.count += 1;
    source.count += 1;
    if (conv.needs_human) {
      g.need += 1;
      source.need += 1;
    }
    if (Number(conv.reply_review_count || 0) > 0) {
      g.review += 1;
      source.review += 1;
    }
  }
  return [...map.values()].sort((a, b) => {
    const order = { facebook: 1, zalo: 2, website: 3, haravan_website: 3 };
    return (order[a.group] || 9) - (order[b.group] || 9) || sourceGroupLabel(a.group).localeCompare(sourceGroupLabel(b.group), 'vi');
  });
}

function sourceMatches(conv) {
  if (state.activeSource === 'all') return true;
  if (state.activeSource.startsWith('group:')) return (conv.source_group || conv.channel || 'common') === state.activeSource.slice(6);
  if (state.activeSource.startsWith('source:')) return getConvSourceKey(conv) === state.activeSource.slice(7);
  return true;
}

function filterMatches(conv) {
  if (state.filter === 'need') return Boolean(conv.needs_human);
  if (state.filter === 'auto') return Boolean(conv.auto_reply);
  return true;
}

function filteredConversations() {
  const keyword = state.search.trim().toLowerCase();
  return state.convs
    .filter(conv => sourceMatches(conv) && filterMatches(conv))
    .filter(conv => {
      if (!keyword) return true;
      return [
        getConvName(conv),
        conv.external_id,
        conv.phone,
        conv.email,
        conv.source_name,
        conv.channel,
        conv.handoff_reason
      ].some(value => String(value || '').toLowerCase().includes(keyword));
    })
    .sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0));
}

function renderSourceTree() {
  const groups = buildSourceTree();
  const total = state.convs.length;
  const countText = (count, need, review = 0) => [count, need ? `${need} !` : '', review ? `${review} ${t('navImprovements')}` : ''].filter(Boolean).join(' · ');
  return `
    <div class="source-tree">
      <button class="source-item ${state.activeSource === 'all' ? 'active' : ''}" data-source-filter="all">
        <span>${esc(t('allSources'))}</span><span class="count">${total}</span>
      </button>
      ${groups.map(group => `
        <details class="source-group" open>
          <summary>
            <span>${esc(sourceGroupLabel(group.group))}</span>
            <span class="count">${countText(group.count, group.need, group.review)}</span>
          </summary>
          ${[...group.sources.values()].sort((a, b) => b.need - a.need || b.count - a.count || a.name.localeCompare(b.name, 'vi')).map(src => `
            <button class="source-item ${state.activeSource === `source:${src.key}` ? 'active' : ''}" data-source-filter="source:${esc(src.key)}">
              <span>${esc(src.name)}</span><span class="count">${countText(src.count, src.need, src.review)}</span>

  `;
}

function expandableText(text, cls = 'msg-text') {
  const raw = String(text ?? '');
  const long = raw.length > 460 || raw.split(/\r?\n/).length > 8;
  return `<div class="${cls}${long ? ' collapsed' : ''}">${esc(raw)}</div>${long ? `<button class="show-more" type="button">${esc(t('showMore'))}</button>` : ''}`;
}

function bindExpandable() {
  $$('.show-more').forEach(btn => {
    btn.onclick = event => {
      event.stopPropagation();
      const box = btn.previousElementSibling;
      const expanded = box.classList.toggle('expanded');
      box.classList.toggle('collapsed', !expanded);
      btn.textContent = expanded ? t('collapse') : t('showMore');
    };
  });
}

                <select id="logType" style="width:180px">
                  <option value="ai" ${state.logType === 'ai' ? 'selected' : ''}>AI responses</option>
                  <option value="alerts" ${state.logType === 'alerts' ? 'selected' : ''}>Staff alerts</option>
                </select>
                <button class="btn ghost" id="reloadLogsBtn" type="button">${esc(t('refresh'))}</button>
              </div>
            </div>
          </div>
          <div class="panel-body">${state.logs.entries.length ? state.logs.entries.map(renderLogEntry).join('') : `<div class="muted">${esc(t('noData'))}</div>`}</div>
        </div>
      </div>
    </div>
  `;
}

function knowledgeSourceOptions() {
  const sources = state.knowledgeSources.length ? state.knowledgeSources : [{ sourceKey: 'common', name: t('common') }];
  return sources.map(source => `
    <option value="${esc(source.sourceKey)}" ${state.kSource === source.sourceKey ? 'selected' : ''}>
      ${esc(source.name || source.sourceKey)} · ${esc(source.sourceKey)}
    </option>
  `).join('');
}

function formatBytes(bytes) {
  const n = Number(bytes || 0);
  if (!n) return '0 B';
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / 1024 / 1024).toFixed(1)} MB`;
}

function formatFileTime(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return '';
  return date.toLocaleString(state.lang === 'vi' ? 'vi-VN' : state.lang === 'zh' ? 'zh-CN' : 'en-US');
}

function renderUploadFiles() {
  const fileLabels = {
    products: t('productCsv'),
    faq: t('advisoryKnowledge'),
    policies: t('policyScope')
  };
  const accepts = {
    products: '.csv,text/csv',
    faq: '.txt,.md,text/plain,text/markdown',
    policies: '.txt,.md,text/plain,text/markdown'
  };
  const files = new Map((state.knowledgeFiles.files || []).map(file => [file.type, file]));
  const viewer = state.trainingViewer;
  return `
    <div class="page-card">
      <div class="panel-head">
        <div>
          <h3>${esc(t('uploadTrainingFiles'))}</h3>
          <div class="muted">${esc(t('uploadTrainingSub'))}</div>
        </div>
      </div>
      <div class="upload-grid">
        ${Object.entries(fileLabels).map(([type, label]) => {
          const info = files.get(type) || {};
          const meta = info.exists
            ? `${formatBytes(info.bytes)} · ${esc(t('fileUpdated'))}: ${esc(formatFileTime(info.updatedAt))}`
            : esc(t('noFileUploaded'));
          return `
            <div class="upload-card">
              <strong>${esc(label)}</strong>
              <div class="upload-meta">${meta}</div>
              <input type="file" data-upload-file="${esc(type)}" accept="${esc(accepts[type])}" multiple />
              <div class="upload-actions">
                <button class="btn ghost" data-upload-training="${esc(type)}" type="button">${esc(t('uploadFile'))}</button>
                <button class="btn ghost" data-view-training="${esc(type)}" type="button">${esc(t('viewFile'))}</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      ${viewer ? `
        <div class="file-viewer">
          <div class="row space">
            <div>
              <strong>${esc(t('currentFile'))}: ${esc(fileLabels[viewer.type] || viewer.type)}</strong>
              <div class="muted">${formatBytes(viewer.bytes)}${viewer.updatedAt ? ` · ${esc(t('fileUpdated'))}: ${esc(formatFileTime(viewer.updatedAt))}` : ''}</div>
            </div>
            <button class="btn ghost" id="closeFileViewerBtn" type="button">${esc(t('closeFile'))}</button>
          </div>
          <textarea readonly>${esc(viewer.content || '')}</textarea>
        </div>
      ` : ''}
    </div>
  `;
}

function renderKnowledge() {
  const labels = { faq: t('faq'), policies: t('policies'), catalog_summary: t('catalog') };
  return `
    <div class="page">
      <div class="dashboard-grid">
        <div class="page-card">
          <div class="panel-head">
            <div class="row space">
              <div>
                <h3>${esc(t('trainingSource'))}</h3>
                <div class="muted">${esc(t('sourceKnowledge'))}</div>
              </div>
              <select id="kSource" style="max-width:420px">${knowledgeSourceOptions()}</select>
            </div>
          </div>
        </div>
        ${renderUploadFiles()}
        <div class="knowledge-grid">
          ${Object.entries(labels).map(([type, label]) => `
            <div class="knowledge-card">
              <label for="k-${esc(type)}">${esc(label)}</label>
              <textarea id="k-${esc(type)}" data-knowledge-type="${esc(type)}">${esc(state.knowledge[type] || '')}</textarea>
              <button class="btn" data-save-knowledge="${esc(type)}" type="button">${esc(t('saveContent'))}</button>
            </div>
          `).join('')}
        </div>
        <div class="row">
          <button class="btn gray" id="reloadKnowledgeBtn" type="button">${esc(t('reload'))}</button>
        </div>
      </div>
    </div>
  `;
}

function bindRenderedEvents() {
  $$('[data-source-filter]').forEach(btn => {
    btn.onclick = () => {
      state.activeSource = btn.dataset.sourceFilter;
      render();
    };
  });

  $$('[data-filter]').forEach(btn => {
    btn.onclick = () => {
      state.filter = btn.dataset.filter;
      render();
    };
  });

  $$('[data-conv-id]').forEach(btn => {
    btn.onclick = () => openConv(btn.dataset.convId);
  });

  $$('[data-delete-msg]').forEach(btn => {
    btn.onclick = () => deleteMessage(btn.dataset.deleteMsg);
  });

  $$('[data-review-msg]').forEach(btn => {
    btn.onclick = () => markAiReplyWrong(btn.dataset.reviewMsg);
  });

  $$('[data-alert-conv]').forEach(btn => {
    btn.onclick = () => openConv(btn.dataset.alertConv);
  });

  $$('[data-review-conv]').forEach(btn => {
    btn.onclick = () => openConv(btn.dataset.reviewConv);
  });

  if ($('#toggleAutoBtn')) $('#toggleAutoBtn').onclick = toggleAuto;
  if ($('#conversationSearch')) {
    $('#conversationSearch').oninput = event => {
      state.search = event.target.value;
      render();
      const search = $('#conversationSearch');
      search?.focus();
      search?.setSelectionRange(state.search.length, state.search.length);
    };
  }
  if ($('#handoffBtn')) $('#handoffBtn').onclick = handoff;
  if ($('#resolveBtn')) $('#resolveBtn').onclick = resolveHandoff;
  if ($('#summaryBtn')) $('#summaryBtn').onclick = summarize;
  if ($('#saveSummaryBtn')) $('#saveSummaryBtn').onclick = saveSummary;
  if ($('#deleteConvBtn')) $('#deleteConvBtn').onclick = deleteConversation;
  if ($('#staffReplyBtn')) $('#staffReplyBtn').onclick = sendStaffReply;
  if ($('#sendTestBtn')) $('#sendTestBtn').onclick = sendTest;
  if ($('#reloadAlertsBtn')) $('#reloadAlertsBtn').onclick = async () => {
    await loadAlerts();
    render();
    toast(t('reloaded'));
  };
  if ($('#reloadReviewsBtn')) $('#reloadReviewsBtn').onclick = async () => {
    await loadReplyReviews();
    render();
    toast(t('reloaded'));
  };
  if ($('#reloadLogsBtn')) $('#reloadLogsBtn').onclick = async () => {
    await loadLogs(state.logType);
    render();
    toast(t('reloaded'));
  };
  if ($('#logType')) $('#logType').onchange = async event => {
    state.logType = event.target.value;
    await loadLogs(state.logType);
    render();
  };
  if ($('#kSource')) $('#kSource').onchange = event => loadKnowledge(event.target.value);
  if ($('#reloadKnowledgeBtn')) $('#reloadKnowledgeBtn').onclick = () => loadKnowledge(state.kSource, true);
  $$('[data-save-knowledge]').forEach(btn => {
    btn.onclick = () => saveKnowledge(btn.dataset.saveKnowledge);
  });
  $$('[data-upload-training]').forEach(btn => {
    btn.onclick = () => uploadTrainingFile(btn.dataset.uploadTraining);
  });
  $$('[data-view-training]').forEach(btn => {
    btn.onclick = () => viewTrainingFile(btn.dataset.viewTraining);
  });
  if ($('#closeFileViewerBtn')) $('#closeFileViewerBtn').onclick = () => {
    state.trainingViewer = null;
    render();
  };

  bindExpandable();

  const chatScroll = $('#chatScroll');
  if (chatScroll) chatScroll.scrollTop = chatScroll.scrollHeight;
}

function render() {
  renderShell();
  if (state.view === 'dashboard') $('#content').innerHTML = renderDashboard();
  else if (state.view === 'alerts') $('#content').innerHTML = renderAlertsPage();
  else if (state.view === 'improvements') $('#content').innerHTML = renderImprovementsPage();
  else if (state.view === 'knowledge') $('#content').innerHTML = renderKnowledge();
  else if (state.view === 'logs') $('#content').innerHTML = renderLogs();
  else $('#content').innerHTML = renderChatView();
  bindRenderedEvents();
}

async function load() {
  const [stats, convs] = await Promise.all([
    api(API + '/stats'),
    api(API + '/conversations')
  ]);
  state.stats = stats;
  state.convs = convs;
}

async function loadAlerts() {
  state.alerts = await api(API + '/alerts?status=open');
}

async function loadReplyReviews() {
  state.replyReviews = await api(API + '/reply-reviews?status=active&limit=200');
}

async function loadLogs(type = state.logType) {
  state.logType = type;
  state.logs = await api(API + '/logs?type=' + encodeURIComponent(type) + '&limit=120');
}

async function loadKnowledge(sourceKey = state.kSource, showToast = false) {
  const previousSource = state.kSource;
  if (!state.knowledgeSources.length) {
    state.knowledgeSources = await api(API + '/knowledge-sources');
  }
  state.kSource = state.knowledgeSources.some(source => source.sourceKey === sourceKey) ? sourceKey : 'common';
  if (state.kSource !== previousSource) state.trainingViewer = null;
  const [knowledge, files] = await Promise.all([
    api(API + '/knowledge?sourceKey=' + encodeURIComponent(state.kSource)),
    api(API + '/knowledge-files?sourceKey=' + encodeURIComponent(state.kSource))
  ]);
  state.knowledge = knowledge;
  state.knowledgeFiles = files;
  if (showToast) toast(t('reloaded'));
  render();
}

async function openConv(id) {
  state.selected = await api(API + '/conversations/' + encodeURIComponent(id));
  state.view = 'chat';
  localStorage.setItem('kc-admin-view', 'chat');
  render();
}

async function refreshSelected() {
  const id = state.selected?.conversation?.id;
  await load();
  if (id) state.selected = await api(API + '/conversations/' + encodeURIComponent(id));
  render();
}

async function toggleAuto() {
  await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id) + '/toggle-auto-reply', { method: 'POST' });
  await refreshSelected();
  toast(t('updatedAuto'));
}

async function handoff() {
  const reason = prompt(t('handoffPrompt'), state.selected?.conversation?.handoff_reason || t('handoffDefault'));
  if (!reason) return;
  await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id) + '/handoff', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reason })
  });
  await refreshSelected();
  toast(t('alertCreated'));
}

async function resolveHandoff() {
  const note = prompt(t('resolvePrompt'), t('resolveDefault'));
  await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id) + '/resolve-handoff', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ note: note || '' })
  });
  await refreshSelected();
  toast(t('resolvedToast'));
}

async function summarize() {
  toast(t('summarizing'));
  await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id) + '/summarize', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ language: state.lang })
  });
  await refreshSelected();
  toast(t('summarized'));
}

async function saveSummary() {
  await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id), {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ summary: $('#summaryText').value })
  });
  await refreshSelected();
  toast(t('savedSummary'));
}

async function sendStaffReply() {
  const text = $('#staffReplyText')?.value.trim();
  if (!text) return;
  await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id) + '/staff-reply', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
  await refreshSelected();
  toast(t('sentReply'));
}

async function deleteConversation() {
  const id = state.selected?.conversation?.id;
  if (!id || !confirm(t('deleteConvConfirm'))) return;
  await api(API + '/conversations/' + encodeURIComponent(id), { method: 'DELETE' });
  state.selected = null;
  await load();
  render();
  toast(t('deletedConversation'));
}

async function deleteMessage(id) {
  if (!confirm(t('deleteMsgConfirm'))) return;
  await api(API + '/messages/' + encodeURIComponent(id), { method: 'DELETE' });
  await refreshSelected();
  toast(t('deletedMessage'));
}

async function markAiReplyWrong(id) {
  const messages = state.selected?.messages || [];
  const index = messages.findIndex(item => item.id === id);
  const message = messages[index];
  if (!message || !state.selected?.conversation) return;
  const previousCustomer = [...messages.slice(0, index)].reverse().find(item => item.direction === 'in');
  const issueType = prompt(t('reviewIssuePrompt'), 'Tra loi sai/lac de/cau chu chua tu nhien');
  if (!issueType) return;
  const notes = prompt(t('reviewNotesPrompt'), '') || '';
  await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id) + '/reviews', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messageId: id,
      issueType,
      customerText: previousCustomer?.text || '',
      aiReply: message.text || '',
      notes
    })
  });
  await Promise.all([refreshSelected(), loadReplyReviews()]);
  toast(t('reviewedAi'));
}

async function saveKnowledge(type) {
  const box = $(`[data-knowledge-type="${type}"]`);
  if (!box) return;
  state.knowledge[type] = box.value;
  await api(API + '/knowledge/' + encodeURIComponent(type), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sourceKey: state.kSource, content: box.value })
  });
  toast(`${t('saved')} ${type}`);
}

async function combineTrainingFiles(type, files) {
  const texts = await Promise.all(files.map(async file => ({
    name: file.name,
    text: (await file.text()).replace(/^\uFEFF/, '').trimEnd()
  })));
  if (type === 'products') {
    return texts.map((item, index) => {
      const lines = item.text.split(/\r?\n/).filter(line => line.trim());
      return index === 0 ? lines.join('\n') : lines.slice(1).join('\n');
    }).filter(Boolean).join('\n') + '\n';
  }
  return texts.map(item => `## ${item.name}\n\n${item.text}`).join('\n\n---\n\n') + '\n';
}

async function uploadTrainingFile(type) {
  const input = $(`[data-upload-file="${type}"]`);
  const files = [...(input?.files || [])];
  if (!files.length) return toast(t('selectFileFirst'));
  const allowed = type === 'products' ? ['csv'] : ['txt', 'md'];
  if (files.some(file => !allowed.includes(file.name.toLowerCase().split('.').pop()))) return toast(t('unsupportedFile'));
  const content = await combineTrainingFiles(type, files);
  await api(API + '/knowledge-file/' + encodeURIComponent(type) + '?sourceKey=' + encodeURIComponent(state.kSource), {
    method: 'PUT',
    headers: { 'Content-Type': 'text/plain; charset=utf-8' },
    body: content
  });
  const viewedType = state.trainingViewer?.type;
  await loadKnowledge(state.kSource);
  if (viewedType === type) await viewTrainingFile(type);
  toast(`${t('uploaded')} ${files.map(file => file.name).join(', ')}`);
}

async function viewTrainingFile(type) {
  const data = await api(API + '/knowledge-file/' + encodeURIComponent(type) + '?sourceKey=' + encodeURIComponent(state.kSource));
  state.trainingViewer = data;
  render();
}

async function sendTest() {
  await api('/webhooks/website-chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      visitorId: 'local-test-' + Date.now(),
      name: 'Khách test',
      message: $('#testMsg').value
    })
  });
  await load();
  render();
  toast(t('sentTest'));
}

async function startDashboard() {
  try {
    await Promise.all([load(), loadAlerts()]);
    if (state.view === 'improvements') await loadReplyReviews();
    if (state.view === 'knowledge') await loadKnowledge(state.kSource);
    if (state.view === 'logs') await loadLogs(state.logType);
    const id = new URLSearchParams(location.search).get('conversation');
    if (id) await openConv(id);
    else render();
  } catch (e) {
    toast(t('loadError') + e.message);
    render();
  }
}

$$('.nav-btn').forEach(btn => { btn.onclick = () => setView(btn.dataset.view); });
$('#refreshBtn').onclick = async () => {
  await Promise.all([
    load(),
    (state.view === 'dashboard' || state.view === 'alerts') ? loadAlerts() : Promise.resolve(),
    state.view === 'improvements' ? loadReplyReviews() : Promise.resolve(),
    state.view === 'logs' ? loadLogs(state.logType) : Promise.resolve()
  ]);
  render();
  toast(t('reloaded'));
};
$('#themeBtn').onclick = () => setTheme(state.theme === 'dark' ? 'light' : 'dark');
$('#langSelect').onchange = event => setLang(event.target.value);
$('#loginForm').onsubmit = login;
$('#logoutBtn').onclick = logout;

setTheme(state.theme);
setLang(state.lang);
checkAuth().then(ok => { if (ok) startDashboard(); });
setInterval(() => {
  if ($('#loginScreen')?.hidden) {
    const active = document.activeElement;
    const isEditing = active && ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName);
    if (isEditing || state.view === 'knowledge') return;
    load()
      .then(async () => {
        if (state.selected?.conversation?.id) {
          state.selected = await api(API + '/conversations/' + encodeURIComponent(state.selected.conversation.id));
        }
        render();
      })
      .catch(() => {});
  }
}, 10000);
</script>
</body>
</html>
