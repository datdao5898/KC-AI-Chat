<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KingCom Widget Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');

    :root{color-scheme:light}
    body{margin:0;font-family:"Quicksand",Arial,Helvetica,sans-serif;background:#f3f7fb;color:#0f172a}
    .wrap{max-width:900px;margin:0 auto;padding:32px 20px 120px}
    .hero{background:#0f172a;color:#fff;border-radius:18px;padding:28px 24px;box-shadow:0 18px 40px rgba(15,23,42,.18)}
    h1{margin:0 0 10px;font-size:30px}
    p{line-height:1.6;margin:10px 0}
    .card{margin-top:18px;background:#fff;border:1px solid #dbe7f0;border-radius:14px;padding:18px;box-shadow:0 10px 25px rgba(15,23,42,.06)}
    code{background:#eaf2ff;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>KingCom Widget Test</h1>
      <p>Trang test widget website chat. Widget nam o goc phai duoi man hinh.</p>
    </section>

    <div class="card">
      <h2>Cach test</h2>
      <p>Mo trang nay qua domain app, vi du <code>/widget-test.html</code>, roi gui tin nhan trong widget.</p>
      <p>Sau khi gui, hoi thoai se xuat hien trong dashboard o nhom Website.</p>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const site = (params.get('site') || 'kingcom').toLowerCase();
      const allowed = new Set(['kingcom', 'newlite']);
      const script = document.createElement('script');
      script.src = '/widget.js';
      script.dataset.siteName = allowed.has(site) ? site : 'kingcom';
      if (allowed.has(site)) document.title = `${site === 'newlite' ? 'NewLite' : 'KingCom'} Widget Test`;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
